<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCP — Ouvrir un tiroir</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border-hover: #444;
    --text: #f0ede8;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #c8f55a;
    --accent-dim: rgba(200, 245, 90, 0.12);
    --accent-dim2: rgba(200, 245, 90, 0.06);
    --claude: #d4a96a;
    --claude-dim: rgba(212, 169, 106, 0.12);
    --chatgpt: #74c69d;
    --chatgpt-dim: rgba(116, 198, 157, 0.12);
    --radius: 10px;
    --radius-lg: 16px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 1.5rem;
    padding: 0.45rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    transition: border-color 0.15s, color 0.15s, transform 0.1s;
  }

  .back-link:hover {
    color: var(--text);
    border-color: var(--border-hover);
  }

  .back-link:active { transform: scale(0.98); }

  .logo {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 0.5rem;
    font-family: var(--font-mono);
    font-weight: 400;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .field-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .select-wrapper {
    position: relative;
  }

  select {
    width: 100%;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 2.5rem 0.75rem 1rem;
    font-family: var(--font-mono);
    font-size: 14px;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
    outline: none;
  }

  select:hover { border-color: var(--border-hover); }
  select:focus { border-color: var(--accent); }

  select option {
    background: var(--surface2);
    color: var(--text);
  }

  .select-arrow {
    position: absolute;
    right: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text-dim);
    font-size: 12px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.25rem 0;
  }

  .llm-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .llm-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.3rem;
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-display);
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .llm-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .llm-btn.claude::before { background: var(--claude-dim); }
  .llm-btn.chatgpt::before { background: var(--chatgpt-dim); }

  .llm-btn:hover { border-color: var(--border-hover); }
  .llm-btn.claude:hover { border-color: var(--claude); }
  .llm-btn.chatgpt:hover { border-color: var(--chatgpt); }
  .llm-btn:hover::before { opacity: 1; }

  .llm-btn:active { transform: scale(0.98); }

  .llm-name {
    font-size: 15px;
    font-weight: 600;
    position: relative;
  }

  .llm-btn.claude .llm-name { color: var(--claude); }
  .llm-btn.chatgpt .llm-name { color: var(--chatgpt); }

  .llm-action {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    position: relative;
  }

  .loading-state {
    display: none;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1rem;
    background: var(--accent-dim2);
    border: 1px solid rgba(200, 245, 90, 0.2);
    border-radius: var(--radius);
    margin-top: 1rem;
  }

  .loading-state.visible { display: flex; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 1.5px solid rgba(200, 245, 90, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--accent);
  }

  .success-state {
    display: none;
    flex-direction: column;
    gap: 0.75rem;
    margin-top: 1rem;
  }

  .success-state.visible { display: flex; }

  .copy-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.9rem 1rem;
    background: var(--accent-dim);
    border: 1px solid rgba(200, 245, 90, 0.3);
    border-radius: var(--radius);
  }

  .copy-info {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--accent);
    line-height: 1.4;
  }

  .copy-info strong {
    display: block;
    font-size: 13px;
    margin-bottom: 1px;
  }

  .copy-btn {
    flex-shrink: 0;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .copy-btn:hover { opacity: 0.9; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: #3a7d3a; color: #c8f5c8; }

  .hint {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    text-align: center;
    padding: 0.4rem 0;
  }

  .hint span {
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 10px;
  }

  .error-state {
    display: none;
    padding: 0.9rem 1rem;
    background: rgba(226, 75, 74, 0.08);
    border: 1px solid rgba(226, 75, 74, 0.25);
    border-radius: var(--radius);
    font-size: 12px;
    font-family: var(--font-mono);
    color: #f09595;
    margin-top: 1rem;
  }

  .error-state.visible { display: block; }

  .footer {
    margin-top: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .client-badge {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .reset-btn {
    background: none;
    border: none;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.3rem 0.5rem;
    border-radius: 6px;
    transition: color 0.15s;
  }

  .reset-btn:hover { color: var(--text-muted); }

  @media (max-width: 400px) {
    .title { font-size: 22px; }
    .llm-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <a href="./index.html" class="back-link">← Menu principal</a>
    <div class="logo">KCP — Knowledge Context Protocol</div>
    <h1 class="title">Ouvre un tiroir</h1>
    <p class="subtitle">// sélectionne · copie · colle dans Claude</p>
  </div>

  <div class="card">
    <div class="field-label">Tiroir</div>
    <div class="select-wrapper">
      <select id="tiroir-select">
        <option value="">— choisir un tiroir —</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>

    <div class="divider"></div>

    <div class="field-label">Ouvrir dans</div>
    <div class="llm-grid">
      <button class="llm-btn claude" onclick="launch('claude')" id="btn-claude" disabled>
        <span class="llm-name">Claude</span>
        <span class="llm-action">copier + ouvrir →</span>
      </button>
      <button class="llm-btn chatgpt" onclick="launch('chatgpt')" id="btn-chatgpt" disabled>
        <span class="llm-name">ChatGPT</span>
        <span class="llm-action">copier + ouvrir →</span>
      </button>
    </div>

    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <span class="loading-text">Chargement du prompt…</span>
    </div>

    <div class="success-state" id="success">
      <div class="copy-banner">
        <div class="copy-info">
          <strong>Prompt copié ✓</strong>
          Colle-le dans le champ de saisie
        </div>
        <button class="copy-btn" id="copy-again-btn" onclick="copyAgain()">Copier à nouveau</button>
      </div>
      <p class="hint">
        <span>Ctrl+V</span> sur PC &nbsp;·&nbsp; <span>⌘V</span> sur Mac &nbsp;·&nbsp; appui long sur mobile
      </p>
    </div>

    <div class="error-state" id="error"></div>
  </div>

  <div class="footer">
    <div class="client-badge">
      <div class="dot"></div>
      <span id="client-label">C00003 · Antoine</span>
    </div>
    <button class="reset-btn" onclick="reset()">↺ réinitialiser</button>
  </div>

</div>

<script>
  /* ─── CONFIG ─────────────────────────────────────────────────────────── */
  const CONFIG = {
    client_id: 'C00003',
    client_name: 'Antoine',
    /* Remplacer ces deux URLs par les vrais webhooks Make */
    webhook_list:   'https://hook.eu2.make.com/REMPLACER_WEBHOOK_LISTE_TIROIRS',
    webhook_prompt: 'https://hook.eu2.make.com/REMPLACER_WEBHOOK_PROMPT',
  };
  /* ─────────────────────────────────────────────────────────────────────── */

  let currentPrompt = '';
  let currentLLM = '';

  const sel = document.getElementById('tiroir-select');
  const btnClaude = document.getElementById('btn-claude');
  const btnChatgpt = document.getElementById('btn-chatgpt');
  const loadingEl = document.getElementById('loading');
  const successEl = document.getElementById('success');
  const errorEl = document.getElementById('error');

  document.getElementById('client-label').textContent =
    CONFIG.client_id + ' · ' + CONFIG.client_name;

  /* Charger la liste des tiroirs au démarrage */
  async function loadTiroirs() {
    try {
      /* Données de démo si le webhook n'est pas encore configuré */
      const isDev = CONFIG.webhook_list.includes('REMPLACER');
      let tiroirs;

      if (isDev) {
        tiroirs = [
          { id: 'kcp',              label: '#kcp' },
          { id: 'migration-yardi',  label: '#migration-yardi' },
          { id: 'facturation',      label: '#facturation' },
          { id: 'yooz',             label: '#yooz' },
          { id: 'make',             label: '#make' },
        ];
      } else {
        const res = await fetch(CONFIG.webhook_list, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ client_id: CONFIG.client_id }),
        });
        tiroirs = await res.json();
      }

      tiroirs.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.label || '#' + t.id;
        sel.appendChild(opt);
      });
    } catch (e) {
      showError('Impossible de charger les tiroirs. Vérifie la connexion.');
    }
  }

  sel.addEventListener('change', () => {
    const hasVal = !!sel.value;
    btnClaude.disabled = !hasVal;
    btnChatgpt.disabled = !hasVal;
    hideAll();
  });

  async function launch(llm) {
    const tiroir = sel.value;
    if (!tiroir) return;

    currentLLM = llm;
    hideAll();
    showLoading(true);

    try {
      const isDev = CONFIG.webhook_prompt.includes('REMPLACER');
      let prompt;

      if (isDev) {
        await new Promise(r => setTimeout(r, 800));
        prompt = `## CONFIGURATION\nid_client       : ${CONFIG.client_id}\nnom_tiroir      : ${tiroir}\nsource          : llm\nwebhook         : https://hook.eu2.make.com/yd3clx7t5yozoppfcdegocw51n8yeehc\n\n[Contenu du TIA_Prompt pour le tiroir #${tiroir} — sera injecté dynamiquement par Make depuis Notion]\n\nBloc 1 — INITIALISATION\nCette conversation est dédiée EXCLUSIVEMENT au tiroir indiqué en CONFIGURATION.\n...`;
      } else {
        const res = await fetch(CONFIG.webhook_prompt, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ client_id: CONFIG.client_id, tiroir }),
        });
        const data = await res.json();
        prompt = data.prompt || data.content || data.text || '';
      }

      currentPrompt = prompt;
      await copyToClipboard(prompt);
      showLoading(false);
      showSuccess();

      const urls = {
        claude:  'https://claude.ai/new',
        chatgpt: 'https://chatgpt.com/',
      };
      window.open(urls[llm], '_blank');

    } catch (e) {
      showLoading(false);
      showError('Erreur lors du chargement du prompt. Réessaie.');
    }
  }

  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  async function copyAgain() {
    const btn = document.getElementById('copy-again-btn');
    await copyToClipboard(currentPrompt);
    btn.textContent = 'Copié ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copier à nouveau';
      btn.classList.remove('copied');
    }, 1800);
  }

  function reset() {
    sel.value = '';
    btnClaude.disabled = true;
    btnChatgpt.disabled = true;
    currentPrompt = '';
    hideAll();
  }

  function showLoading(v) { loadingEl.classList.toggle('visible', v); }
  function showSuccess()  { successEl.classList.add('visible'); }
  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
  }
  function hideAll() {
    loadingEl.classList.remove('visible');
    successEl.classList.remove('visible');
    errorEl.classList.remove('visible');
  }

  loadTiroirs();
</script>
</body>
</html>
