<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCP — Nouveau tiroir</title>
<script src="./config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f6f4ee; --surface:#ffffff; --surface2:#efece2;
    --border:#d3cebd; --border-strong:#b8b2a0;
    --ink:#16150f; --ink-soft:#3d3b30; --muted:#524e3e;
    --accent:#c8f55a; --accent-deep:#4d6b14;
    --dark:#14160f; --dark-soft:#1d2016; --dark-border:#2c2f22;
    --dark-text:#eef0e5; --dark-muted:#9aa088;
    --r:14px; --font:'Syne',sans-serif; --mono:'DM Mono',monospace;
  }
  html { background:#14160f; min-height:100vh; padding:0 1.5rem; }
  body { background:var(--bg); color:var(--ink); font-family:var(--font); max-width:600px; margin:0 auto;  min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2.5rem 2rem 3rem; }
  .wrap { width:100%; max-width:100%; display:flex; flex-direction:column; gap:1.15rem; }

  .back { display:inline-flex; align-items:center; gap:0.4rem; font-size:13px; font-family:var(--mono); font-weight:500; color:var(--ink-soft); text-decoration:none; padding:0.45rem 0.9rem; border:1.5px solid var(--border-strong); border-radius:100px; background:var(--surface); transition:all 0.15s; align-self:flex-start; margin-bottom:1.4rem; }
  .back:hover { color:var(--ink); border-color:var(--ink); }
  .kcp-tag { font-size:11px; font-family:var(--mono); color:var(--accent-deep); letter-spacing:0.15em; text-transform:uppercase; display:block; margin-bottom:0.7rem; }
  .page-title { font-size:28px; font-weight:700; letter-spacing:-0.02em; }

  .card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:1.5rem; box-shadow:0 1px 6px rgba(22,21,15,0.06); display:flex; flex-direction:column; gap:1.25rem; }

  .field { display:flex; flex-direction:column; gap:0.5rem; }
  .label { font-size:12px; font-family:var(--mono); color:var(--ink); letter-spacing:0.08em; text-transform:uppercase; font-weight:500; display:flex; align-items:center; justify-content:space-between; }
  .hint { font-size:12px; color:var(--muted); text-transform:none; letter-spacing:0; font-weight:500; font-family:var(--mono); }
  .hint.err { color:#8a2f2f; }

  input[type=text], textarea, select { width:100%; background:var(--surface2); color:var(--ink); border:1.5px solid var(--border); border-radius:10px; padding:0.85rem 1rem; font-family:var(--font); font-size:15px; font-weight:600; outline:none; appearance:none; transition:border-color 0.15s; }
  input::placeholder, textarea::placeholder { color:var(--muted); font-weight:400; }
  input:focus, textarea:focus { border-color:var(--ink); background:var(--surface); }

  .pfx { position:relative; }
  .pfx-sym { position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:15px; font-weight:600; color:var(--ink-soft); pointer-events:none; font-family:var(--mono); }
  .pfx input { padding-left:1.65rem; font-family:var(--mono); }

  textarea { resize:none; min-height:80px; line-height:1.5; font-weight:500; font-size:14px; }

  .toggle { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
  .tog-btn { padding:0.8rem; border-radius:10px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); font-family:var(--font); font-size:15px; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .tog-btn:hover { color:var(--ink-soft); border-color:var(--border-strong); }
  .tog-btn.on { background:var(--dark); border-color:var(--dark); color:var(--dark-text); }

  .btn-dark { width:100%; padding:1rem; background:var(--dark); color:var(--dark-text); border:none; border-radius:10px; font-family:var(--font); font-size:15px; font-weight:700; cursor:pointer; transition:background 0.15s, transform 0.1s; }
  .btn-dark:hover { background:var(--dark-soft); }
  .btn-dark:active { transform:scale(0.99); }
  .btn-dark:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }

  /* States */
  .state { display:none; }
  .state.on { display:flex; }
  .loading { align-items:center; gap:0.75rem; padding:1rem; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; }
  .spinner { width:16px; height:16px; border:2px solid var(--border-strong); border-top-color:var(--ink); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-txt { font-size:14px; font-family:var(--mono); color:var(--ink-soft); }

  .success { flex-direction:column; gap:0.75rem; padding:1.25rem; background:var(--dark); border:1.5px solid var(--dark-border); border-radius:10px; position:relative; overflow:hidden; }
  .success::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); }
  .s-label { font-size:11px; font-family:var(--mono); color:var(--accent); letter-spacing:0.15em; text-transform:uppercase; }
  .s-name { font-size:18px; font-weight:700; color:var(--dark-text); font-family:var(--mono); }
  .notion-btn { display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; margin-top:0.25rem; background:var(--accent); color:var(--dark); text-decoration:none; border-radius:8px; padding:0.7rem 1rem; font-family:var(--mono); font-size:13px; font-weight:600; transition:opacity 0.15s; }
  .notion-btn:hover { opacity:0.85; }

  .error-state { display:none; padding:0.9rem 1rem; border:1.5px solid var(--border-strong); border-radius:10px; font-size:13px; font-family:var(--mono); color:var(--ink-soft); }
  .error-state.on { display:block; }

  .footer { display:flex; align-items:center; justify-content:center; gap:0.5rem; }
  .footer-text { font-size:11px; font-family:var(--mono); color:var(--muted); }
  .dot { width:5px; height:5px; border-radius:50%; background:var(--accent-deep); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.6)}}

  .wrap > * { opacity:0; transform:translateY(8px); animation:up 0.3s ease forwards; }
  .wrap > :nth-child(1){animation-delay:.04s} .wrap > :nth-child(2){animation-delay:.09s}
  .wrap > :nth-child(3){animation-delay:.13s} .wrap > :nth-child(4){animation-delay:.17s}
  @keyframes up{to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){ html{padding:0} body{border-radius:0; min-height:100vh} }
</style>
</head>
<body>
<div class="wrap">

  <div>
    <a href="./index.html" class="back">← Retour</a>
    <span class="kcp-tag">KCP — Knowledge Context Protocol</span>
    <h1 class="page-title">Nouveau tiroir</h1>
  </div>

  <div class="card">
    <div class="field">
      <label class="label" for="nom">
        Nom du tiroir
        <span class="hint" id="nom-hint">minuscules, chiffres, tirets</span>
      </label>
      <div class="pfx">
        <span class="pfx-sym">#</span>
        <input type="text" id="nom" placeholder="nom-du-tiroir" autocomplete="off" spellcheck="false" maxlength="60" oninput="onNom()">
      </div>
    </div>

    <div class="field">
      <span class="label">Sphère</span>
      <div class="toggle">
        <button class="tog-btn on" id="btn-pro" onclick="setSphere('professional')">Professionnel</button>
        <button class="tog-btn" id="btn-perso" onclick="setSphere('personal')">Personnel</button>
      </div>
    </div>

    <div class="field">
      <label class="label" for="perim">
        Périmètre déclaré
        <span class="hint" id="perim-hint">min. 10 caractères</span>
      </label>
      <textarea id="perim" placeholder="Ce tiroir sert à…" maxlength="400" oninput="check()"></textarea>
    </div>

    <button class="btn-dark" id="submit" onclick="submit()" disabled>Créer le tiroir →</button>

    <div class="state loading" id="s-loading">
      <div class="spinner"></div>
      <span class="loading-txt">Création en cours…</span>
    </div>

    <div class="state success" id="s-success">
      <span class="s-label">Tiroir créé ✓</span>
      <span class="s-name" id="s-name"></span>
      <a class="notion-btn" id="s-notion" href="#" target="_blank" rel="noopener">Ouvrir dans Notion →</a>
    </div>

    <div class="error-state" id="s-error"></div>
  </div>

  <div class="footer"><div class="dot"></div><span class="footer-text">système actif · KCP V2</span></div>

</div>
<script>
  const C = KCP_CONFIG;

  // Garde de session (config.js redirige déjà, double sécurité + id_client).
  const _session = (typeof kcpGetSession === 'function') ? kcpGetSession() : JSON.parse(localStorage.getItem('kcp_session') || 'null');
  if (!_session || !_session.client_id) { location.replace('./login.html'); }
  const id_client = _session ? _session.client_id : null;

  let sphere = 'professional';

  const nomEl = document.getElementById('nom');
  const perimEl = document.getElementById('perim');
  const submitEl = document.getElementById('submit');
  const nomHint = document.getElementById('nom-hint');

  // Normalise en direct : minuscules, chiffres, tirets uniquement.
  function onNom() {
    const raw = nomEl.value;
    const clean = raw.toLowerCase().replace(/[^a-z0-9-]/g, '');
    if (clean !== raw) { nomEl.value = clean; nomHint.textContent = 'seuls a-z, 0-9 et - sont autorisés'; nomHint.classList.add('err'); }
    else { nomHint.textContent = 'minuscules, chiffres, tirets'; nomHint.classList.remove('err'); }
    check();
  }

  function setSphere(v) {
    sphere = v;
    document.getElementById('btn-pro').classList.toggle('on', v === 'professional');
    document.getElementById('btn-perso').classList.toggle('on', v === 'personal');
  }

  function check() {
    const nomOk = nomEl.value.trim().length >= 2;
    const perimLen = perimEl.value.trim().length;
    const perimOk = perimLen >= 10;
    const ph = document.getElementById('perim-hint');
    if (perimLen > 0 && !perimOk) {
      const reste = 10 - perimLen;
      ph.textContent = 'encore ' + reste + ' caractère' + (reste > 1 ? 's' : '');
      ph.classList.add('err');
    } else {
      ph.textContent = 'min. 10 caractères';
      ph.classList.remove('err');
    }
    submitEl.disabled = !(nomOk && perimOk);
  }

  function show(id) { document.getElementById(id).classList.add('on'); }
  function hide(id) { document.getElementById(id).classList.remove('on'); }
  function showErr(m) { const e = document.getElementById('s-error'); e.textContent = m; e.classList.add('on'); }
  function clearErr() { document.getElementById('s-error').classList.remove('on'); }

  async function submit() {
    const nom_tiroir = nomEl.value.trim();
    const perimetre_declare = perimEl.value.trim();
    if (nom_tiroir.length < 2 || perimetre_declare.length < 10) return;

    clearErr();
    submitEl.style.display = 'none';
    hide('s-success');
    show('s-loading');

    let res, data = {};
    try {
      res = await fetch(C.webhooks.creer_tiroir, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_client, nom_tiroir, sphere, perimetre_declare })
      });
      // Lire le corps AVANT tout test de statut (la 409 porte error:label_exists).
      const raw = await res.text();
      const cleaned = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '').trim();
      try { data = JSON.parse(cleaned); } catch (e) { data = {}; }
    } catch (e) {
      hide('s-loading');
      submitEl.style.display = '';
      showErr('Création impossible. Réessaie.');
      return;
    }

    hide('s-loading');

    if (res.ok && data.success) {
      document.getElementById('s-name').textContent = '#' + nom_tiroir;
      const link = document.getElementById('s-notion');
      if (data.notion_url) { link.href = data.notion_url; link.style.display = ''; }
      else { link.style.display = 'none'; }
      show('s-success');
    } else if (res.status === 409 || data.error === 'label_exists') {
      submitEl.style.display = '';
      showErr('Ce nom existe déjà, choisis-en un autre.');
    } else {
      submitEl.style.display = '';
      showErr('Création impossible. Réessaie.');
    }
  }
</script>
</body>
</html>
